events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    upstream frontend {
        server frontend_api:80;
    }

    upstream edge_manager_grpc {
        server edge_manager:50051;
    }

    # API & Frontend Web Traffic
    server {
        listen 8080;
        server_name _;

        # WebSocket for sim_backend
        location /ws/ {
            proxy_pass http://sim_backend:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # FastAPI HTTP endpoints for edge (e.g., WebRTC signaling)
        location /api/edge/ {
            proxy_pass http://edge_manager:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Main Frontend API
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # gRPC Traffic for Edge Manager
    server {
        # Using HTTP/2 for gRPC (without SSL for testing/PoC, can be changed to SSL)
        listen 8443 http2;
        server_name _;

        location / {
            # Route all traffic to edge_manager gRPC port
            grpc_pass grpc://edge_manager_grpc;
            grpc_set_header Host $host;
        }
    }
}
